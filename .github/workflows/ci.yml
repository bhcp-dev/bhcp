name: Rust quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rust quality / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: format
            name: Format
            command: cargo fmt --check
          - id: clippy
            name: Clippy
            command: cargo clippy --all-targets -- -D warnings
          - id: tests
            name: Tests
            command: cargo test --all-targets
          - id: release
            name: Release build
            command: cargo build --release
          - id: schema
            name: 17-root CDDL fixtures
            command: cargo test --test schema_fixtures all_seventeen_root_fixtures_parse_validate_and_round_trip -- --exact
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true
          install: true

      - name: Restore Cargo dependency cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('.mise.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('.mise.toml') }}-

      - name: Run ${{ matrix.name }}
        run: mise exec -- ${{ matrix.command }}
